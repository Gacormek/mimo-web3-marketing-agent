<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo Web3 Marketing Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 2rem;
            border-bottom: 1px solid #333;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #888; margin-top: 0.5rem; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: #00d4ff; }
        .card h3 {
            color: #00d4ff;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .card label {
            display: block;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        .card input, .card select, .card textarea {
            width: 100%;
            padding: 0.7rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .card input:focus, .card select:focus, .card textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            background: #333;
            color: #e0e0e0;
        }
        .output {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            display: none;
        }
        .output.show { display: block; }
        .status-bar {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .status-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            min-width: 150px;
        }
        .status-item .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff;
        }
        .status-item .label {
            color: #888;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        .loading { opacity: 0.5; pointer-events: none; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .agent-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .agent-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .agent-running { background: #0f3d0f; color: #4ade80; border: 1px solid #166534; }
        .agent-idle { background: #3d3d0f; color: #facc15; border: 1px solid #854d0e; }
        .agent-error { background: #3d0f0f; color: #f87171; border: 1px solid #991b1b; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MiMo Web3 Marketing Agent</h1>
        <p>AI-powered multi-agent system for Web3 marketing automation</p>
        <div class="agent-list" id="agentList"></div>
    </div>
    
    <div class="container">
        <div class="status-bar" id="statusBar"></div>
        
        <div class="grid">
            <!-- Content Generator -->
            <div class="card">
                <h3>Content Generator</h3>
                <label>Project Name</label>
                <input type="text" id="projectName" placeholder="e.g. Uniswap" value="">
                <label>Features (comma-separated)</label>
                <input type="text" id="features" placeholder="e.g. DEX, AMM, Liquidity">
                <label>Content Type</label>
                <select id="contentType">
                    <option value="tweet">Tweet</option>
                    <option value="thread">Thread</option>
                    <option value="article">Article</option>
                    <option value="announcement">Announcement</option>
                    <option value="meme_caption">Meme Caption</option>
                </select>
                <label>Tone</label>
                <select id="tone">
                    <option value="engaging">Engaging</option>
                    <option value="professional">Professional</option>
                    <option value="degen">Degen</option>
                    <option value="educational">Educational</option>
                </select>
                <label>Chain</label>
                <select id="chain">
                    <option value="ethereum">Ethereum</option>
                    <option value="polygon">Polygon</option>
                    <option value="arbitrum">Arbitrum</option>
                    <option value="base">Base</option>
                    <option value="optimism">Optimism</option>
                </select>
                <button class="btn btn-primary" onclick="generateContent()">Generate</button>
                <div class="output" id="contentOutput"></div>
            </div>
            
            <!-- Narrative Analyzer -->
            <div class="card">
                <h3>Narrative Analyzer</h3>
                <label>Chain</label>
                <select id="narrChain">
                    <option value="ethereum">Ethereum</option>
                    <option value="polygon">Polygon</option>
                    <option value="arbitrum">Arbitrum</option>
                    <option value="base">Base</option>
                </select>
                <label>Timeframe</label>
                <select id="narrTimeframe">
                    <option value="24h">24 Hours</option>
                    <option value="7d">7 Days</option>
                    <option value="30d">30 Days</option>
                </select>
                <button class="btn btn-primary" onclick="analyzeNarrative()">Analyze</button>
                <div class="output" id="narrativeOutput"></div>
            </div>
            
            <!-- On-Chain Metrics -->
            <div class="card">
                <h3>On-Chain Metrics</h3>
                <label>Token Address</label>
                <input type="text" id="tokenAddress" placeholder="0x...">
                <label>Chain</label>
                <select id="onchainChain">
                    <option value="ethereum">Ethereum</option>
                    <option value="polygon">Polygon</option>
                    <option value="arbitrum">Arbitrum</option>
                    <option value="base">Base</option>
                </select>
                <button class="btn btn-primary" onclick="fetchMetrics()">Fetch Metrics</button>
                <div class="output" id="metricsOutput"></div>
            </div>
            
            <!-- RAG Ingestion -->
            <div class="card">
                <h3>Document Ingestion (RAG)</h3>
                <label>Project ID</label>
                <input type="text" id="ragProject" placeholder="my-project" value="default">
                <label>Document Content</label>
                <textarea id="ragContent" rows="4" placeholder="Paste document content here..."></textarea>
                <label>Document Type</label>
                <select id="ragType">
                    <option value="whitepaper">Whitepaper</option>
                    <option value="tokenomics">Tokenomics</option>
                    <option value="roadmap">Roadmap</option>
                    <option value="faq">FAQ</option>
                </select>
                <button class="btn btn-primary" onclick="ingestDoc()">Ingest</button>
                <div class="output" id="ragOutput"></div>
            </div>
            
            <!-- Campaign Manager -->
            <div class="card">
                <h3>Campaign Manager</h3>
                <label>Campaign Name</label>
                <input type="text" id="campaignName" placeholder="Launch Campaign">
                <label>Platform</label>
                <select id="platform">
                    <option value="twitter">Twitter/X</option>
                    <option value="discord">Discord</option>
                    <option value="telegram">Telegram</option>
                </select>
                <label>Duration (days)</label>
                <input type="number" id="duration" value="7" min="1" max="30">
                <label>Content Ideas</label>
                <textarea id="campaignIdeas" rows="3" placeholder="One idea per line..."></textarea>
                <button class="btn btn-primary" onclick="createCampaign()">Create Campaign</button>
                <div class="output" id="campaignOutput"></div>
            </div>
            
            <!-- Narrative Matching -->
            <div class="card">
                <h3>Narrative Matcher</h3>
                <label>Project Features (comma-separated)</label>
                <input type="text" id="matchFeatures" placeholder="e.g. Layer 2, DeFi, NFT">
                <label>Project Description</label>
                <textarea id="matchDesc" rows="3" placeholder="Brief description of your project..."></textarea>
                <button class="btn btn-primary" onclick="matchNarrative()">Find Narratives</button>
                <div class="output" id="matchOutput"></div>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        
        async function apiCall(endpoint, data) {
            const outputId = endpoint.includes('generate') ? 'contentOutput' :
                           endpoint.includes('analyze') ? 'narrativeOutput' :
                           endpoint.includes('onchain') ? 'metricsOutput' :
                           endpoint.includes('rag') ? 'ragOutput' :
                           endpoint.includes('campaign') ? 'campaignOutput' :
                           'matchOutput';
            
            const output = document.getElementById(outputId);
            output.classList.add('show');
            output.innerHTML = '<span class="spinner"></span> Processing...';
            
            try {
                const resp = await fetch(API + endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data),
                });
                const result = await resp.json();
                output.innerHTML = JSON.stringify(result, null, 2);
            } catch (err) {
                output.innerHTML = 'Error: ' + err.message;
            }
        }
        
        async function generateContent() {
            await apiCall('/api/generate', {
                project: {
                    name: document.getElementById('projectName').value,
                    features: document.getElementById('features').value.split(',').map(s => s.trim()),
                },
                type: document.getElementById('contentType').value,
                tone: document.getElementById('tone').value,
                chain: document.getElementById('chain').value,
            });
        }
        
        async function analyzeNarrative() {
            await apiCall('/api/analyze', {
                chain: document.getElementById('narrChain').value,
                timeframe: document.getElementById('narrTimeframe').value,
            });
        }
        
        async function fetchMetrics() {
            await apiCall('/api/onchain', {
                address: document.getElementById('tokenAddress').value,
                chain: document.getElementById('onchainChain').value,
            });
        }
        
        async function ingestDoc() {
            await apiCall('/api/rag/ingest', {
                project_id: document.getElementById('ragProject').value,
                documents: [{
                    content: document.getElementById('ragContent').value,
                    metadata: {type: document.getElementById('ragType').value},
                }],
            });
        }
        
        async function createCampaign() {
            const ideas = document.getElementById('campaignIdeas').value.split('\n').filter(s => s.trim());
            await apiCall('/api/campaign', {
                name: document.getElementById('campaignName').value,
                platform: document.getElementById('platform').value,
                duration_days: parseInt(document.getElementById('duration').value),
                content_ideas: ideas,
            });
        }
        
        async function matchNarrative() {
            const resp = await fetch(API + '/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chain: 'ethereum',
                    timeframe: '24h',
                }),
            });
            const result = await resp.json();
            document.getElementById('matchOutput').classList.add('show');
            document.getElementById('matchOutput').innerHTML = JSON.stringify(result, null, 2);
        }
        
        // Load agent status on page load
        async function loadStatus() {
            try {
                const resp = await fetch(API + '/api/agents');
                const agents = await resp.json();
                
                const list = document.getElementById('agentList');
                list.innerHTML = '';
                for (const [name, info] of Object.entries(agents)) {
                    const badge = document.createElement('span');
                    badge.className = 'agent-badge agent-' + info.state;
                    badge.textContent = name + ' (' + info.state + ')';
                    list.appendChild(badge);
                }
                
                const metrics = await (await fetch(API + '/api/metrics')).json();
                const bar = document.getElementById('statusBar');
                bar.innerHTML = `
                    <div class="status-item">
                        <div class="value">${Object.keys(agents).length}</div>
                        <div class="label">Active Agents</div>
                    </div>
                    <div class="status-item">
                        <div class="value">${metrics.total_events || 0}</div>
                        <div class="label">Total Events</div>
                    </div>
                    <div class="status-item">
                        <div class="value">${metrics.events_per_minute || 0}</div>
                        <div class="label">Events/min</div>
                    </div>
                    <div class="status-item">
                        <div class="value">${Math.round((metrics.uptime_seconds || 0) / 60)}m</div>
                        <div class="label">Uptime</div>
                    </div>
                `;
            } catch (err) {
                console.error('Status load error:', err);
            }
        }
        
        loadStatus();
        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
