version: "3.8"

services:
  mimo-marketing:
    build: .
    container_name: mimo-web3-marketing
    ports:
      - "8080:8080"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:20128/v1}
      - LLM_MODEL=${LLM_MODEL:-xmtp/mimo-v2.5-pro}
      - LLM_API_KEY=${LLM_API_KEY:-sk-hermes}
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
